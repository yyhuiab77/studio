<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lift Dashboard</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #18181b;
        color: #e4e4e7;
      }
      .container {
        text-align: center;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.2rem;
        color: #a1a1aa;
        margin-bottom: 2rem;
      }
      a {
        font-size: 1.2rem;
        color: #a7b7ff;
        text-decoration: none;
        border: 1px solid #a7b7ff;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        transition: background-color 0.2s, color 0.2s;
      }
      a:hover {
        background-color: #a7b7ff;
        color: #18181b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Lift Dashboard</h1>
      <p>Your Next.js application is running.</p>
      <a href="/login">Access the Dashboard</a>
    </div>
  </body>
</html>
